<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StartupSarthi — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#312e81 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.35);}
.brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:28px;color:#4f46e5;font-weight:700;font-size:1.25rem;}
.brand i{color:#4f46e5;width:28px;height:28px}
h2{font-size:1.5rem;font-weight:700;color:#0f172a;margin-bottom:4px}
.sub{color:#64748b;font-size:.9rem;margin-bottom:24px}
.form-group{margin-bottom:16px;position:relative}
.form-group label{display:block;font-size:.82rem;font-weight:600;color:#64748b;margin-bottom:6px}
.form-group input{width:100%;padding:10px 12px 10px 38px;border:1px solid #e2e8f0;border-radius:10px;font-family:inherit;font-size:.95rem;outline:none;transition:all .15s;color:#0f172a;}
.form-group input:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,0.08)}
.form-group i{position:absolute;left:12px;bottom:11px;color:#94a3b8;width:18px;height:18px}
button[type=submit]{width:100%;padding:12px;border-radius:10px;border:none;background:#4f46e5;color:#fff;font-weight:600;font-size:.95rem;cursor:pointer;transition:background .15s;font-family:inherit;margin-top:4px;}
button[type=submit]:hover{background:#4338ca}
.footer{text-align:center;margin-top:20px;font-size:.85rem;color:#94a3b8}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><i data-lucide="rocket"></i>StartupSarthi</div>
  <h2>Welcome back</h2>
  <p class="sub">Sign in to your admin dashboard</p>
  <form method="post" action="/login">
    <div class="form-group">
      <label>Username</label>
      <i data-lucide="user"></i>
      <input name="username" placeholder="admin" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <i data-lucide="lock"></i>
      <input name="password" type="password" placeholder="********" required>
    </div>
    <button type="submit">Sign In</button>
  </form>
  <p class="footer">Powered by StartupSarthi AI</p>
</div>
<script>document.addEventListener('DOMContentLoaded',()=>lucide.createIcons());</script>
</body>
</html>
